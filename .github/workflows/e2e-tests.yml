name: E2E Tests

on:
  pull_request:
    branches: [staging]

permissions:
  contents: read
  checks: write

jobs:
  e2e:
    name: E2E — Staging Health Gate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify staging is healthy before merge
        run: |
          echo "Running health gate against ${{ vars.STAGING_URL }}..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging is not healthy (HTTP $STATUS). Blocking merge."
            exit 1
          fi
          echo "Staging health check passed."

