name: PR Validation

on:
  pull_request:
    branches: [main, staging, develop]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: self-hosted  # saves ~66 min/month
    steps:
      - name: Check PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            hotfix
            chore
            docs
            refactor
            test
            ci
            perf
            build
          requireScope: false

  validate-branch-name:
    name: Validate Branch Name
    runs-on: self-hosted  # saves ~66 min/month
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feature|fix|hotfix|chore|refactor|release|test|ci)/.+"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch '$BRANCH' does not follow naming convention."
            echo "Expected: <type>/<description>  (e.g. feature/add-auth)"
            echo "Valid types: feature, fix, hotfix, chore, refactor, release, test, ci"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."
