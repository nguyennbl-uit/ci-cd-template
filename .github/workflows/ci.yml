name: CI

on:
  pull_request:
    branches: [main, staging, develop]

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check code formatting
        run: dotnet format --verify-no-changes --no-restore

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests & Collect Coverage
        run: |
          dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report & enforce threshold
        run: |
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html;MarkdownSummaryGithub" \
            -historydir:"coveragereport/history" \
            "-assemblyfilters:+*" \
            -verbosity:Warning

          # Enforce 70% line coverage threshold
          COVERAGE=$(grep -oP '(?<=<line-rate>)[0-9.]+' ./coverage/**/coverage.cobertura.xml | \
            awk '{ sum += $1; count++ } END { if (count > 0) printf "%.0f", (sum/count)*100; else print 0 }')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 70 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the required threshold of 70%."
            exit 1
          fi

      - name: Publish Summary to GitHub
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check for vulnerable packages
        run: |
          echo "Checking for vulnerable NuGet packages..."

          RESULT=$(dotnet list package --vulnerable --include-transitive 2>&1)

          echo "$RESULT"

          if echo "$RESULT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected."
            exit 1
          else
            echo "No vulnerable packages found."
          fi
