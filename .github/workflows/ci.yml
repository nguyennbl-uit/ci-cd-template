name: CI

on:
  pull_request:
    branches: [main, staging, develop]

permissions:
  contents: read
  pull-requests: write  # required for coverage PR comment

jobs:
  code-quality:
    name: Code Quality
    runs-on: self-hosted  # saves ~132 min/month
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check code formatting
        run: dotnet format --verify-no-changes --no-restore

  # ── Unit Tests ────────────────────────────────────────────────────────────
  # Fast, no external dependencies. Runs on every PR to all branches.
  unit-tests:
    name: Unit Tests
    runs-on: self-hosted  # saves ~330 min/month
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test --configuration Release --no-build \
            --filter "Category=Unit" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/unit \
            --logger "trx;LogFileName=unit-results.trx" \
            --maxcpucount

      - name: Publish Unit Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: ./coverage/unit/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report & enforce threshold
        run: |
          reportgenerator \
            -reports:"./coverage/unit/**/coverage.cobertura.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html;MarkdownSummaryGithub" \
            -verbosity:Warning

          COVERAGE=$(grep -oP '(?<=<line-rate>)[0-9.]+' ./coverage/unit/**/coverage.cobertura.xml | \
            awk '{ sum += $1; count++ } END { if (count > 0) printf "%.0f", (sum/count)*100; else print 0 }')
          echo "Unit test line coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 70 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the required threshold of 70%."
            exit 1
          fi

      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: unit-coverage
          recreate: true
          path: coveragereport/SummaryGithub.md

      - name: Publish coverage summary to GitHub
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coveragereport/
          retention-days: 7

  # ── Integration Tests ─────────────────────────────────────────────────────
  # Slower, may require external dependencies (DB, cache, etc.).
  # Runs in parallel with unit-tests — only on PRs targeting staging or main.
  integration-tests:
    name: Integration Tests
    runs-on: self-hosted  # saves ~330 min/month
    needs: code-quality
    if: |
      github.base_ref == 'staging' ||
      github.base_ref == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Integration Tests
        run: |
          dotnet test --configuration Release --no-build \
            --filter "Category=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/integration \
            --logger "trx;LogFileName=integration-results.trx" \
            --maxcpucount

      - name: Publish Integration Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: ./coverage/integration/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: ./coverage/integration/
          retention-days: 7

  # ── Security Scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: self-hosted  # saves ~198 min/month
    needs: [unit-tests, integration-tests]
    # Run after both test jobs — integration-tests may be skipped on develop PRs
    if: always() && needs.unit-tests.result == 'success' && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check for vulnerable packages
        run: |
          echo "Checking for vulnerable NuGet packages..."

          RESULT=$(dotnet list package --vulnerable --include-transitive 2>&1)

          echo "$RESULT"

          if echo "$RESULT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected."
            exit 1
          else
            echo "No vulnerable packages found."
          fi
